name: Monthly TV DB Crawl

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          playwright install chromium

      - name: Run monthly crawler
        env:
          PYTHONPATH: backend
        run: |
          cd backend
          python tv_db/monthly_runner.py

      - name: Compute scores
        env:
          PYTHONPATH: backend
        run: |
          python scripts/compute_scores.py --db backend/tv_db/tv_products.db

      - name: Export to D1 SQL
        run: |
          python scripts/export_to_d1.py \
            --db backend/tv_db/tv_products.db \
            --out scripts/d1_import.sql

      - name: Update D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute danawa-tv \
            --file=scripts/d1_import.sql \
            --remote

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/tv_db/tv_products.db
          git diff --staged --quiet || git commit -m "chore: monthly TV DB update $(date +%Y-%m)"
          git push
